site_name: ORM-IRIS Library Documentation
theme:
  name: material

plugins:
  - search
  - mkdocstrings
  - gen-files:
      scripts:
        - generate_doc_ref_pages.py  # Custom script to generate reference pages
  - literate-nav:
      nav_file: SUMMARY.md

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Developer Guide:
    - Coordinate Frames of Reference: developer/coordinate_frames.md
  - API Reference: reference/

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css